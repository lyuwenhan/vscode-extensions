name: Publish Needed Extensions

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "data/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install

      - name: Run publish script
        id: publish
        run: node scripts/publish-if-needed.js
        env:
          OPEN_VSX_TOKEN: ${{ secrets.OPEN_VSX_TOKEN }}
          VS_MARKETPLACE_TOKEN: ${{ secrets.VS_MARKETPLACE_TOKEN }}

      - name: Commit and push status updates
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Auto-update after publish by github-actions[bot]"

          for i in 1 2 3 4 5; do
            echo "Attempt $i to pull --rebase and push..."
            git pull --rebase origin main && git push origin HEAD:main && break

            if [ "$i" -eq 5 ]; then
              echo "Push failed after 5 attempts"
              exit 1
            fi

            echo "Retrying in 5 seconds..."
            sleep 5
          done
