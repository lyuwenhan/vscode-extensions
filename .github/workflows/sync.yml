name: Sync data folder

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "data/**"
  workflow_run:
    workflows: ["Publish Needed Extensions"]
    types:
      - completed

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Clone lyuwenhan.github.io
        run: |
          git clone https://x-access-token:${{ secrets.SYNC_PAT }}@github.com/lyuwenhan/lyuwenhan.github.io.git target

      - name: Sync files
        run: |
          mkdir -p target/extensions/vscode/data
          rsync -av --delete data/ target/extensions/vscode/data/

      - name: Commit & Push
        run: |
          cd target
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Auto sync data folder"

          for i in 1 2 3 4 5; do
            echo "Attempt $i to pull --rebase and push..."
            git pull --rebase origin main && git push origin main && break

            if [ "$i" -eq 5 ]; then
              echo "Push failed after 5 attempts"
              exit 1
            fi

            echo "Retrying in 5 seconds..."
            sleep 5
          done
