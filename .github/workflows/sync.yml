name: Sync data folder

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "data/**"
  workflow_run:
    workflows: ["Publish Needed Extensions"]
    types:
      - completed

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Clone lyuwenhan.github.io
        run: |
          git clone https://x-access-token:${{ secrets.SYNC_PAT }}@github.com/lyuwenhan/lyuwenhan.github.io.git target

      - name: Sync files
        run: |
          mkdir -p target/extensions/vscode/data
          rsync -av --delete data/ target/extensions/vscode/data/

      - name: Commit & Push
        run: |
          cd target
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Auto sync data folder"
          git pull --rebase origin main
          git push origin main

          curl -X POST \
            -H "Authorization: token ${{ secrets.SYNC_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/lyuwenhan/lyuwenhan.github.io/dispatches \
            -d '{"event_type":"sync_display"}'
